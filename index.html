// ── Cloudinary ────────────────────────────────────────
const CLOUD_NAME="dszgkrp57";
const UPLOAD_PRESET="nwvjh3sw";
async function uploadToCloudinary(dataUrl){
  const blob=await(await fetch(dataUrl)).blob();
  const fd=new FormData();
  fd.append("file",blob);
  fd.append("upload_preset",UPLOAD_PRESET);
  fd.append("folder","bookcovers");
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{method:"POST",body:fd});
  if(!res.ok)throw new Error("上傳失敗");
  const data=await res.json();
  // 回傳 webp 格式 + 壓縮品質，節省頻寬
  return data.secure_url.replace("/upload/","/upload/f_webp,q_80,w_400/");
}

// ── State ─────────────────────────────────────────────
const VK="bsvw1";
let state={
  books:lsGet(SK,[]),lists:lsGet(LK,[]),listOrders:lsGet(OK,{}),wishlist:lsGet(WK,[]),customTags:lsGet(TK,DEFAULT_TAGS),
  page:"library",search:"",filtP:"全部",filtS:"全部",filtTag:"全部",filtTags:[],sortBy:"newest",listSortModes:{},
  user:null,syncMsg:"",
  modal:null,listSearch:"",statsYear:new Date().getFullYear(),// {type:"addBook"|"editBook"|"detailBook"|"addWish"|"editWish"|"detailWish"|"random"|"listPicker", data:...}
  activeList:null,randMode:"all",viewMode:lsGet(VK,"list"),listViewModes:{}
};

function lsGet(k,d){try{const s=localStorage.getItem(k);return s?JSON.parse(s):d}catch{return d}}
function lsSave(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true;}catch{return false;}}

function compressImage(dataUrl,callback){
  const isPng=dataUrl.startsWith("data:image/png");
  const img=new Image();
  img.onload=()=>{
    const MAX=400;
    let w=img.width,h=img.height;
    if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
    const canvas=document.createElement("canvas");
    canvas.width=w;canvas.height=h;
    const ctx=canvas.getContext("2d");
    if(!isPng){ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h);}
    ctx.drawImage(img,0,0,w,h);
    callback(isPng?canvas.toDataURL("image/png"):canvas.toDataURL("image/jpeg",0.7));
  };
  img.src=dataUrl;
}

function setState(patch){
  Object.assign(state,typeof patch==="function"?patch(state):patch);
  // 記住 modal 捲軸位置，render 後還原，避免 Firebase sync 觸發時畫面跳回頂部
  const prevScroll=document.querySelector('#app [data-modal]');
  const scrollTop=prevScroll?prevScroll.scrollTop:0;
  render();
  if(scrollTop>0){
    const newModal=document.querySelector('#app [data-modal]');
    if(newModal)newModal.scrollTop=scrollTop;
  }
}

// ── Firebase sync ─────────────────────────────────────
let unsubSnapshot=null;
let pendingSave=null;

async function fbSaveAll(){
  if(!state.user)return;
  // 合併多次快速連續的存檔，避免打太多次 Firestore
  if(pendingSave)clearTimeout(pendingSave);
  pendingSave=setTimeout(async()=>{
    pendingSave=null;
    try{
      // 封面若是 base64（舊資料或上傳失敗），不存 Firestore 避免超過 1MB；Cloudinary URL 可以直接存
      const booksToSave=state.books.map(b=>({...b,cover:(b.cover&&b.cover.startsWith("http"))?b.cover:(b.cover?"__local__":"")}));
      const wishToSave=state.wishlist.map(w=>({...w,cover:(w.cover&&w.cover.startsWith("http"))?w.cover:(w.cover?"__local__":"")}));
      await setDoc(doc(db,"users",state.user.uid),{
        books:booksToSave,lists:state.lists,
        listOrders:state.listOrders,wishlist:wishToSave,customTags:state.customTags
      });
      setState({syncMsg:"✅ 已儲存"});
      setTimeout(()=>setState({syncMsg:""}),2000);
    }catch(e){
      console.error("fbSaveAll error:",e);
      setState({syncMsg:"❌ 儲存失敗: "+e.message});
    }
  },300);
}

onAuthStateChanged(auth,(u)=>{
  if(unsubSnapshot){unsubSnapshot();unsubSnapshot=null;}
  setState({user:u,syncMsg:u?"同步中...":""});
  if(u){
    unsubSnapshot=onSnapshot(doc(db,"users",u.uid),(snap,err)=>{
      if(err){console.error("snapshot error:",err);setState({syncMsg:"❌ 同步失敗: "+err.message});return;}
      // snap.metadata.hasPendingWrites = 本地寫入尚未確認，跳過避免覆蓋自己正在寫的資料
      if(snap.metadata.hasPendingWrites)return;
      if(snap.exists()){
        const d=snap.data();
        const lists=d.lists||[];
        const listOrders=d.listOrders||{};
        const customTags=d.customTags||DEFAULT_TAGS;
        const wishlist=d.wishlist||[];
        // 從 Firebase 回來的書可能封面被標記為 __local__，從 localStorage 還原
        const localBooks=lsGet(SK,[]);const localWish=lsGet(WK,[]);
        const coverMap={};localBooks.forEach(b=>{if(b.cover&&b.cover!=="__local__")coverMap[b.id]=b.cover;});
        const coverMapW={};localWish.forEach(w=>{if(w.cover&&w.cover!=="__local__")coverMapW[w.id]=w.cover;});
        const books=(d.books||[]).map(b=>({...b,cover:b.cover==="__local__"?(coverMap[b.id]||""):b.cover}));
        const wishlistFull=wishlist.map(w=>({...w,cover:w.cover==="__local__"?(coverMapW[w.id]||""):w.cover}));
        lsSave(SK,books);lsSave(LK,lists);lsSave(OK,listOrders);lsSave(WK,wishlistFull);lsSave(TK,customTags);
        setState({books,lists,listOrders,wishlist:wishlistFull,customTags,syncMsg:"✅ 已同步"});
        setTimeout(()=>setState({syncMsg:""}),2000);
      }else{
        fbSaveAll();
        setState({syncMsg:"✅ 已登入（上傳本地資料）"});
        setTimeout(()=>setState({syncMsg:""}),3000);
      }
    });
  }
});

// ── Data helpers ──────────────────────────────────────
function saveBook(b){
  const nb=state.books.some(x=>x.id===b.id)?state.books.map(x=>x.id===b.id?b:x):[b,...state.books];
  setState({books:nb});
  const saved=lsSave(SK,nb);
  if(!saved&&!state.user){
    // localStorage 已滿，且未登入，無法儲存
    alert("⚠️ 本機儲存空間已滿！\n\n請登入 Google 帳號，資料將改存在雲端，不受空間限制。\n\n（書籍已暫存在記憶體，重新整理後會消失）");
  }else if(!saved&&state.user){
    // localStorage 滿了但有登入，Firebase 會救它
    console.warn("localStorage full, relying on Firebase");
  }
  fbSaveAll();
}
function delBook(id){
  const nb=state.books.filter(x=>x.id!==id);
  setState({books:nb});lsSave(SK,nb);fbSaveAll();
}
function saveWish(w){
  const nw=state.wishlist.some(x=>x.id===w.id)?state.wishlist.map(x=>x.id===w.id?w:x):[w,...state.wishlist];
  setState({wishlist:nw});lsSave(WK,nw);fbSaveAll();
}
function delWish(id){
  const nw=state.wishlist.filter(x=>x.id!==id);
  setState({wishlist:nw});lsSave(WK,nw);fbSaveAll();
}
function addList(n){
  if(state.lists.includes(n))return;
  const nl=[...state.lists,n];setState({lists:nl});lsSave(LK,nl);fbSaveAll();
}
function delList(n){
  const nl=state.lists.filter(x=>x!==n);
  const nb=state.books.map(b=>({...b,lists:(b.lists||[]).filter(x=>x!==n)}));
  setState({lists:nl,books:nb});lsSave(LK,nl);lsSave(SK,nb);fbSaveAll();
}
function renameList(o,n){
  const nl=state.lists.map(x=>x===o?n:x);
  const lo={...state.listOrders};if(lo[o]){lo[n]=lo[o];delete lo[o];}
  const nb=state.books.map(b=>({...b,lists:(b.lists||[]).map(x=>x===o?n:x)}));
  setState({lists:nl,listOrders:lo,books:nb});lsSave(LK,nl);lsSave(OK,lo);lsSave(SK,nb);fbSaveAll();
}
function reorderBooks(list,ids){
  const lo={...state.listOrders,[list]:ids};
  setState({listOrders:lo});lsSave(OK,lo);fbSaveAll();
}
function toggleBookInList(book,listName,add){
  const nb=state.books.map(b=>b.id===book.id?{...b,lists:add?[...(b.lists||[]),listName]:(b.lists||[]).filter(x=>x!==listName)}:b);
  setState({books:nb});lsSave(SK,nb);fbSaveAll();
}

// ── HTML helpers ──────────────────────────────────────
const h=(tag,attrs={},children=[])=>{
  const el=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on")&&typeof v==="function")el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else if(k==="src")el.src=v;
    else if(k==="type")el.type=v;
    else if(k==="accept")el.accept=v;
    else if(k==="href"){el.href=v;el.target="_blank";el.rel="noopener noreferrer";}
    else if(k==="draggable")el.draggable=v;
    else el.setAttribute(k,v);
  });
  children.forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  });
  return el;
};
const div=(a,c)=>h("div",a,c);
const btn=(a,c)=>h("button",{...a,className:"btn"},c);
const txt=(t)=>document.createTextNode(t);

function stars(value,onChange,size=18){
  const wrap=div({style:{display:"flex",gap:"2px"}});
  for(let n=1;n<=5;n++){
    const s=h("span",{
      style:{fontSize:size+"px",cursor:onChange?"pointer":"default",color:n<=value?"#F59E0B":"#D1D5DB"},
      onClick:onChange?()=>{onChange(value===n?0:n);}:null
    },[String(n<=value?"★":"★")]);
    s.textContent="★";
    s.style.color=n<=value?"#F59E0B":"#D1D5DB";
    wrap.appendChild(s);
  }
  return wrap;
}

// ── Book Form ─────────────────────────────────────────
function makeBookForm(initial,onSave,onClose,title){
  let form={title:"",author:"",cover:"",platform:"Kindle",status:"想讀",rating:0,tags:[],lists:[],link:"",note:"",addedYear:new Date().getFullYear(),...initial};
  const hasChanges=()=>!initial||(form.title!=(initial.title||"")||form.author!=(initial.author||"")||form.cover!=(initial.cover||"")||form.note!=(initial.note||""));
  const confirmClose=()=>{if(!initial&&hasChanges()&&!confirm("尚未儲存，確定要離開嗎？"))return;onClose();};
  const IS={width:"100%",padding:"10px 14px",border:"2px solid #e8e8e8",borderRadius:"10px",fontSize:"14px",boxSizing:"border-box",background:"#fff"};
  const LS={display:"block",fontSize:"12px",fontWeight:"700",color:"#555",marginBottom:"5px"};

  const overlay=div({style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"1000",padding:"16px"},onClick:(e)=>{if(e.target===overlay)confirmClose();}});
  const modal=div({"data-modal":"1",style:{background:"#fff",borderRadius:"20px",padding:"24px",width:"100%",maxWidth:"500px",maxHeight:"92vh",overflowY:"auto",boxShadow:"0 24px 80px rgba(0,0,0,0.25)"}});
  overlay.appendChild(modal);

  const header=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"18px"}});
  header.appendChild(h("h2",{style:{margin:"0",fontFamily:"'Noto Serif TC',serif",fontSize:"18px",color:"#1a1a2e"}},[title]));
  header.appendChild(btn({style:{background:"none",border:"none",fontSize:"20px",color:"#999"},onClick:confirmClose},["✕"]));
  modal.appendChild(header);

  // Cover
  const coverLabel=h("label",{style:LS},["封面圖片"]);
  modal.appendChild(coverLabel);
  const coverRow=div({style:{display:"flex",gap:"12px",alignItems:"flex-start",marginBottom:"16px"}});
  const preview=div({style:{width:"80px",height:"110px",flexShrink:"0",borderRadius:"8px",backgroundColor:"#f0f0f0",display:"flex",alignItems:"center",justifyContent:"center",border:"2px dashed #ddd",overflow:"hidden",backgroundSize:"cover",backgroundPosition:"center"}});
  preview.innerHTML="<span style='font-size:28px;color:#ccc'>📖</span>";
  function updatePreview(){
    if(form.cover){preview.style.backgroundImage=`url(${form.cover})`;preview.innerHTML="";}
    else{preview.style.backgroundImage="";preview.innerHTML="<span style='font-size:28px;color:#ccc'>📖</span>";}
  }

  function handleImageFile(file){
    if(!file||!file.type.startsWith("image/"))return;
    const r=new FileReader();
    r.onload=(ev)=>{compressImage(ev.target.result,(compressed)=>{
      form.cover=compressed;updatePreview();
      removeBtn.style.display="";
      if(state.user){
        fileLabel.textContent="上傳中…";
        uploadToCloudinary(compressed).then(url=>{
          form.cover=url;updatePreview();
          fileLabel.textContent="✅ 已上傳";
          setTimeout(()=>{fileLabel.textContent="從裝置選擇圖片：";},2000);
        }).catch(err=>{
          console.error(err);
          fileLabel.textContent="⚠️ 上傳失敗，使用本地圖片";
          setTimeout(()=>{fileLabel.textContent="從裝置選擇圖片：";},3000);
        });
      }
    });};
    r.readAsDataURL(file);
  }

  const fileInput=h("input",{type:"file",accept:"image/*",style:{display:"none"}});
  fileInput.addEventListener("change",(e)=>{handleImageFile(e.target.files&&e.target.files[0]);});

  const dropZone=div({style:{
    border:"2px dashed #d0d0d0",borderRadius:"10px",padding:"14px 10px",
    textAlign:"center",cursor:"pointer",background:"#fafafa",
    fontSize:"12px",color:"#999",lineHeight:"1.6",transition:"all .15s",
    marginBottom:"6px"
  }});
  dropZone.innerHTML="🖼️ 拖曳圖片到這裡<br><span style='color:#bbb'>或</span>";
  dropZone.addEventListener("click",()=>fileInput.click());
  dropZone.addEventListener("dragover",(e)=>{e.preventDefault();dropZone.style.borderColor="#8B5CF6";dropZone.style.background="#f5f3ff";});
  dropZone.addEventListener("dragleave",()=>{dropZone.style.borderColor="#d0d0d0";dropZone.style.background="#fafafa";});
  dropZone.addEventListener("drop",(e)=>{
    e.preventDefault();
    dropZone.style.borderColor="#d0d0d0";dropZone.style.background="#fafafa";
    const file=e.dataTransfer.files&&e.dataTransfer.files[0];
    handleImageFile(file);
  });

  const browseBtn=btn({style:{
    padding:"5px 14px",background:"#1a1a2e",color:"#fff",border:"none",
    borderRadius:"8px",fontSize:"12px",fontWeight:"700",cursor:"pointer",marginTop:"4px"
  }},["選擇檔案"]);
  browseBtn.addEventListener("click",()=>fileInput.click());
  dropZone.appendChild(document.createElement("br"));
  dropZone.appendChild(browseBtn);

  const fileLabel=h("label",{style:{fontSize:"12px",color:"#666",display:"block",marginBottom:"6px"}},["從裝置選擇圖片："]);
  const removeBtn=btn({style:{marginTop:"4px",background:"none",border:"none",color:"#f87171",fontSize:"12px",padding:"0",display:"none"},onClick:()=>{form.cover="";updatePreview();removeBtn.style.display="none";}},["✕ 移除圖片"]);
  const origRemove=removeBtn.style.display;
  function showRemove(){removeBtn.style.display=form.cover?"":"none";}

  const rightCol=div({style:{flex:"1"}});
  rightCol.appendChild(dropZone);
  rightCol.appendChild(fileInput);
  const rmWrap=div({style:{marginTop:"4px"}});
  rmWrap.appendChild(removeBtn);rightCol.appendChild(rmWrap);
  coverRow.appendChild(preview);coverRow.appendChild(rightCol);
  modal.appendChild(coverRow);

  // Text fields
  [{l:"書名 *",k:"title",p:"書名"},{l:"作者",k:"author",p:"作者姓名"},{l:"平台連結",k:"link",p:"https://（點開直接跳到購書頁）"}].forEach(({l,k,p})=>{
    const wrap=div({style:{marginBottom:"13px"}});
    wrap.appendChild(h("label",{style:LS},[l]));
    const inp=h("input",{style:{...IS}});
    inp.placeholder=p;inp.value=form[k]||"";
    inp.addEventListener("input",()=>{form[k]=inp.value;if(k==="title"){const ok=!!inp.value.trim();saveBtn.disabled=!ok;saveBtn.style.background=ok?"#1a1a2e":"#ccc";}});
    wrap.appendChild(inp);modal.appendChild(wrap);

  // Platform

  platWrap.appendChild(h("label",{style:LS},["平台"]));
  const platRow=div({style:{display:"flex",flexWrap:"wrap",gap:"7px"}});
  PLATFORMS.forEach(p=>{
    const b=btn({style:{padding:"6px 13px",borderRadius:"20px",border:"2px solid",borderColor:form.platform===p?PC[p]:"#e8e8e8",background:form.platform===p?PC[p]+"18":"#fff",color:form.platform===p?PC[p]:"#888",fontWeight:form.platform===p?"700":"400",fontSize:"13px"},
      onClick:()=>{form.platform=p;PLATFORMS.forEach((pp,i)=>{const bb=platRow.children[i];bb.style.borderColor=pp===p?PC[pp]:"#e8e8e8";bb.style.background=pp===p?PC[pp]+"18":"#fff";bb.style.color=pp===p?PC[pp]:"#888";bb.style.fontWeight=pp===p?"700":"400";});}
    },[p]);
    platRow.appendChild(b);
  });
  platWrap.appendChild(platRow);modal.appendChild(platWrap);

  // Status
  const statWrap=div({style:{marginBottom:"13px"}});
  statWrap.appendChild(h("label",{style:LS},["閱讀狀態"]));
  const statRow=div({style:{display:"flex",gap:"7px",flexWrap:"wrap"}});
  Object.entries(SC).forEach(([s,cfg])=>{
    const b=btn({style:{padding:"6px 13px",borderRadius:"20px",border:"2px solid",borderColor:form.status===s?cfg.c:"#e8e8e8",background:form.status===s?cfg.b:"#fff",color:form.status===s?cfg.c:"#888",fontWeight:form.status===s?"700":"400",fontSize:"13px"},
      onClick:()=>{form.status=s;Object.keys(SC).forEach((ss,i)=>{const bb=statRow.children[i];const c=SC[ss];bb.style.borderColor=ss===s?c.c:"#e8e8e8";bb.style.background=ss===s?c.b:"#fff";bb.style.color=ss===s?c.c:"#888";bb.style.fontWeight=ss===s?"700":"400";});}
    },[cfg.e+" "+s]);
    statRow.appendChild(b);
  });
  statWrap.appendChild(statRow);modal.appendChild(statWrap);

  // Rating
  const ratWrap=div({style:{marginBottom:"13px"}});
  ratWrap.appendChild(h("label",{style:LS},["評分（選填）"]));
  let ratingVal=form.rating||0;
  const starContainer=div({style:{display:"flex",gap:"4px"}});
  function renderStars(){
    starContainer.innerHTML="";
    for(let n=1;n<=5;n++){
      const s=h("span",{style:{fontSize:"26px",cursor:"pointer",color:n<=ratingVal?"#F59E0B":"#D1D5DB"}},["★"]);
      s.addEventListener("click",()=>{ratingVal=ratingVal===n?0:n;form.rating=ratingVal;renderStars();});
      starContainer.appendChild(s);
    }
  }
  renderStars();
  ratWrap.appendChild(starContainer);modal.appendChild(ratWrap);

  // Tags
  const tagWrap=div({style:{marginBottom:"13px"}});
  const tagLabelRow=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"5px"}});
  tagLabelRow.appendChild(h("label",{style:{...LS,marginBottom:"0"}},["分類標籤（可多選）"]));
  const newTagBtn=btn({style:{background:"none",border:"none",color:"#1a1a2e",fontSize:"12px",fontWeight:"700",padding:"0",cursor:"pointer"}},["＋ 新增標籤"]);
  tagLabelRow.appendChild(newTagBtn);
  tagWrap.appendChild(tagLabelRow);
  const tagRow=div({style:{display:"flex",flexWrap:"wrap",gap:"7px"}});
  function renderTagBtns(){
    tagRow.innerHTML="";
    state.customTags.forEach(t=>{

  {

          onClick:()=>{

    newListInp.placeholder="書單名稱";
    const confirmBtn=btn({style:{padding:"7px 12px",background:"#1a1a2e",color:"#fff",border:"none",borderRadius:"10px",fontSize:"12px",fontWeight:"700"}},["新增"]);
    const cancelBtn=btn({style:{padding:"7px 10px",background:"#f0f0f0",color:"#555",border:"none",borderRadius:"10px",fontSize:"12px"}},["取消"]);
    confirmBtn.addEventListener("click",()=>{
      const name=newListInp.value.trim();
      if(!name)return;
      if(!state.lists.includes(name)){
        state.lists=[...state.lists,name];
        lsSave(LK,state.lists);fbSaveAll();
      }
      if(!form.lists)form.lists=[];
      if(!form.lists.includes(name))form.lists.push(name);
      newListInp.value="";
      newListRow.style.display="none";
      renderListBtns();
    });
    cancelBtn.addEventListener("click",()=>{newListInp.value="";newListRow.style.display="none";});
    newListInp.addEventListener("keydown",(e)=>{if(e.key==="Enter")confirmBtn.click();if(e.key==="Escape")cancelBtn.click();});
    newListBtn.addEventListener("click",()=>{
      newListRow.style.display="flex";
      setTimeout(()=>newListInp.focus(),30);
    });
    newListRow.appendChild(newListInp);newListRow.appendChild(confirmBtn);newListRow.appendChild(cancelBtn);

  // Save button
  const saveBtn=btn({style:{width:"100%",padding:"13px",border:"none",borderRadius:"12px",background:form.title.trim()?"#1a1a2e":"#ccc",color:"#fff",fontSize:"15px",fontWeight:"700"},

      if(!form.title.trim())return;

      onClose();
    }
  },[initial&&initial.id?"儲存修改":"加入書庫"]);
  saveBtn.disabled=!form.title.trim();
  modal.appendChild(saveBtn);
  // Enter 快速儲存
  modal.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"&&e.target.tagName!=="TEXTAREA"&&e.target.tagName!=="BUTTON"){
      e.preventDefault();
      if(!form.title.trim())return;
      onSave({...form,tags:[...form.tags],lists:[...(form.lists||[])],id:form.id||Date.now()});
      onClose();
    }
  });

  return overlay;
}

// ── Wish Form ─────────────────────────────────────────
function makeWishForm(initial,onSave,onClose,title){
  let form={title:"",author:"",cover:"",platform:"Kindle",link:"",note:"",...initial};
  const IS={width:"100%",padding:"10px 14px",border:"2px solid #e8e8e8",borderRadius:"10px",fontSize:"14px",boxSizing:"border-box",background:"#fff"};
  const LS={display:"block",fontSize:"12px",fontWeight:"700",color:"#555",marginBottom:"5px"};
  const overlay=div({style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"1000",padding:"16px"},onClick:(e)=>{if(e.target===overlay)onClose();}});
  const modal=div({"data-modal":"1",style:{background:"#fff",borderRadius:"20px",padding:"24px",width:"100%",maxWidth:"500px",maxHeight:"92vh",overflowY:"auto",boxShadow:"0 24px 80px rgba(0,0,0,0.25)"}});
  overlay.appendChild(modal);
  const header=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"18px"}});
  header.appendChild(h("h2",{style:{margin:"0",fontFamily:"'Noto Serif TC',serif",fontSize:"18px",color:"#1a1a2e"}},[title]));
  header.appendChild(btn({style:{background:"none",border:"none",fontSize:"20px",color:"#999"},onClick:onClose},["✕"]));
  modal.appendChild(header);
  // Cover
  modal.appendChild(h("label",{style:LS},["封面圖片"]));
  const coverRow=div({style:{display:"flex",gap:"12px",alignItems:"flex-start",marginBottom:"16px"}});
  const preview=div({style:{width:"80px",height:"110px",flexShrink:"0",borderRadius:"8px",backgroundColor:"#f0f0f0",display:"flex",alignItems:"center",justifyContent:"center",border:"2px dashed #ddd",overflow:"hidden",backgroundSize:"cover",backgroundPosition:"center"}});
  preview.innerHTML="<span style='font-size:28px;color:#ccc'>📖</span>";
  function updatePrev(){if(form.cover){preview.style.backgroundImage=`url(${form.cover})`;preview.innerHTML="";}else{preview.style.backgroundImage="";preview.innerHTML="<span style='font-size:28px;color:#ccc'>📖</span>";}}

  const wishFileLabel=h("label",{style:{fontSize:"12px",color:"#10B981",display:"block",marginBottom:"4px",minHeight:"16px"}},["　"]);

  function handleWishImageFile(file){
    if(!file||!file.type.startsWith("image/"))return;
    const r=new FileReader();
    r.onload=(ev)=>{compressImage(ev.target.result,(compressed)=>{
      form.cover=compressed;updatePrev();
      if(state.user){
        wishFileLabel.textContent="上傳中…";wishFileLabel.style.color="#F59E0B";
        uploadToCloudinary(compressed).then(url=>{
          form.cover=url;updatePrev();
          wishFileLabel.textContent="✅ 已上傳";wishFileLabel.style.color="#10B981";
          setTimeout(()=>{wishFileLabel.textContent="　";},2000);
        }).catch(err=>{
          console.error(err);
          wishFileLabel.textContent="⚠️ 上傳失敗，使用本地圖片";wishFileLabel.style.color="#ef4444";
          setTimeout(()=>{wishFileLabel.textContent="　";},3000);
        });
      }
    });};
    r.readAsDataURL(file);
  }

  const fi=h("input",{type:"file",accept:"image/*",style:{display:"none"}});
  fi.addEventListener("change",(e)=>{handleWishImageFile(e.target.files&&e.target.files[0]);});

  const wishDropZone=div({style:{
    border:"2px dashed #d0d0d0",borderRadius:"10px",padding:"14px 10px",
    textAlign:"center",cursor:"pointer",background:"#fafafa",
    fontSize:"12px",color:"#999",lineHeight:"1.6",transition:"all .15s",marginBottom:"4px"
  }});
  wishDropZone.innerHTML="🖼️ 拖曳圖片到這裡<br><span style='color:#bbb'>或</span>";
  wishDropZone.addEventListener("click",()=>fi.click());
  wishDropZone.addEventListener("dragover",(e)=>{e.preventDefault();wishDropZone.style.borderColor="#8B5CF6";wishDropZone.style.background="#f5f3ff";});
  wishDropZone.addEventListener("dragleave",()=>{wishDropZone.style.borderColor="#d0d0d0";wishDropZone.style.background="#fafafa";});
  wishDropZone.addEventListener("drop",(e)=>{
    e.preventDefault();wishDropZone.style.borderColor="#d0d0d0";wishDropZone.style.background="#fafafa";
    handleWishImageFile(e.dataTransfer.files&&e.dataTransfer.files[0]);
  });
  const wishBrowseBtn=btn({style:{padding:"5px 14px",background:"#1a1a2e",color:"#fff",border:"none",borderRadius:"8px",fontSize:"12px",fontWeight:"700",cursor:"pointer",marginTop:"4px"}},["選擇檔案"]);
  wishBrowseBtn.addEventListener("click",()=>fi.click());
  wishDropZone.appendChild(document.createElement("br"));
  wishDropZone.appendChild(wishBrowseBtn);

  const rc=div({style:{flex:"1"}});
  rc.appendChild(wishDropZone);rc.appendChild(fi);rc.appendChild(wishFileLabel);
  coverRow.appendChild(preview);coverRow.appendChild(rc);modal.appendChild(coverRow);
  [{l:"書名 *",k:"title",p:"書名"},{l:"作者",k:"author",p:"作者姓名"},{l:"購買連結",k:"link",p:"https://..."}].forEach(({l,k,p})=>{
    const w=div({style:{marginBottom:"13px"}});w.appendChild(h("label",{style:LS},[l]));
    const inp=h("input",{style:{...IS}});inp.placeholder=p;inp.value=form[k]||"";inp.addEventListener("input",()=>{form[k]=inp.value;});
    w.appendChild(inp);modal.appendChild(w);
  });
  const pw=div({style:{marginBottom:"13px"}});pw.appendChild(h("label",{style:LS},["平台"]));
  const pr=div({style:{display:"flex",flexWrap:"wrap",gap:"7px"}});
  PLATFORMS.forEach(p=>{
    const b=btn({style:{padding:"6px 13px",borderRadius:"20px",border:"2px solid",borderColor:form.platform===p?PC[p]:"#e8e8e8",background:form.platform===p?PC[p]+"18":"#fff",color:form.platform===p?PC[p]:"#888",fontWeight:form.platform===p?"700":"400",fontSize:"13px"},onClick:()=>{form.platform=p;PLATFORMS.forEach((pp,i)=>{const bb=pr.children[i];bb.style.borderColor=pp===p?PC[pp]:"#e8e8e8";bb.style.background=pp===p?PC[pp]+"18":"#fff";bb.style.color=pp===p?PC[pp]:"#888";bb.style.fontWeight=pp===p?"700":"400";});}
    },[p]);pr.appendChild(b);
  });
  pw.appendChild(pr);modal.appendChild(pw);
  const nw=div({style:{marginBottom:"22px"}});nw.appendChild(h("label",{style:LS},["備註（選填）"]));
  const ne=h("textarea",{style:{...IS,resize:"none"}});ne.rows=2;ne.placeholder="價格、出版日期…";ne.value=form.note||"";ne.addEventListener("input",()=>{form.note=ne.value;});
  nw.appendChild(ne);modal.appendChild(nw);
  const sb=btn({style:{width:"100%",padding:"13px",border:"none",borderRadius:"12px",background:"#1a1a2e",color:"#fff",fontSize:"15px",fontWeight:"700"},onClick:()=>{if(!form.title.trim())return;onSave({...form,id:form.id||Date.now()});onClose();}},[initial&&initial.id?"儲存修改":"加入待購清單"]);
  modal.appendChild(sb);
  // Enter 快速儲存
  modal.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"&&e.target.tagName!=="TEXTAREA"&&e.target.tagName!=="BUTTON"){
      e.preventDefault();
      if(!form.title.trim())return;
      onSave({...form,id:form.id||Date.now()});
      onClose();
    }
  });
  return overlay;
}

// ── Detail Modal ──────────────────────────────────────
function makeDetail(book,onClose,onEdit,onDelete){
  const color=PC[book.platform]||"#888";
  const st=SC[book.status]||SC["想讀"];
  const overlay=div({style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"1000",padding:"16px"},onClick:(e)=>{if(e.target===overlay)onClose();}});

  cover.appendChild(div({style:{position:"absolute",bottom:"12px",left:"12px",background:st.b,color:st.c,borderRadius:"20px",padding:"4px 12px",fontSize:"11px",fontWeight:"700",zIndex:"2"}},[st.e+" "+book.status]));
  modal.appendChild(cover);

  if(book.lists&&book.lists.length>0){
    const lw=div({style:{marginBottom:"14px"}});
    lw.appendChild(div({style:{fontSize:"11px",fontWeight:"700",color:"#aaa",marginBottom:"6px"}},["📋 所屬書單"]));
    const lr=div({style:{display:"flex",flexWrap:"wrap",gap:"6px"}});
    book.lists.forEach(l=>{
      const tag=div({style:{background:"#1a1a2e",color:"#e8c97e",borderRadius:"20px",padding:"4px 10px",fontSize:"12px",fontWeight:"600",display:"flex",alignItems:"center",gap:"5px"}});

    book.tags.forEach(t=>{
      const chip=btn({style:{background:"#f0f0f0",color:"#555",borderRadius:"12px",padding:"3px 10px",fontSize:"12px",border:"none",cursor:"pointer"},

  const actions=div({style:{display:"flex",gap:"10px"}});

  actions.appendChild(delBtn);body.appendChild(actions);modal.appendChild(body);
  return overlay;
}

    // Tag dropdown: only show if any book has a tag
    const usedTagsForDrop=state.customTags.filter(t=>books.some(b=>b.tags&&b.tags.includes(t)));

    if(usedTagsForDrop.length>0){
      const tagWrap=div({style:{position:"relative",marginBottom:"10px",display:"inline-block"}});
      const hasSelection=filtTags.length>0;

        display:"flex",alignItems:"center",gap:"6px",

        background:hasSelection?"#ede9fe":"#fafafa",
        color:hasSelection?"#8B5CF6":"#555",
        fontSize:"13px",fontWeight:hasSelection?"700":"400",cursor:"pointer"
      }},["🏷️ 標籤"+(hasSelection?` (${filtTags.length})`:"")+" ▾"]);

      const menu=div({style:{

      content.innerHTML="";

        const q=search.toLowerCase();
        const ft=state.filtTags||[];
        return(!search||(b.title&&b.title.toLowerCase().includes(q))||(b.author&&b.author.toLowerCase().includes(q)))

          &&(ft.length===0||ft.every(t=>b.tags&&b.tags.includes(t)));
      }).sort((a,b)=>{
        // 1. 先照作者排
        const authorCmp=(a.author||"").localeCompare(b.author||"","zh-TW");
        if(authorCmp!==0)return authorCmp;
        // 2. 同作者：同系列照集數排在一起（有 seriesNo 的優先，無集數排後面）
        const aHas=a.seriesNo!=null&&a.seriesNo!=="";
        const bHas=b.seriesNo!=null&&b.seriesNo!=="";
        if(aHas&&bHas)return(Number(a.seriesNo)||0)-(Number(b.seriesNo)||0);
        if(aHas&&!bHas)return -1;
        if(!aHas&&bHas)return 1;
        // 3. 都沒有集數：照書名排
        return(a.title||"").localeCompare(b.title||"","zh-TW");

            booksRow.appendChild(bookEl);

          const plank=div({style:{height:"14px",background:"linear-gradient(180deg,#c9a87c,#a07850)",borderRadius:"2px",marginTop:"10px",boxShadow:"0 4px 8px rgba(0,0,0,0.15)",position:"relative"}});

          const cvr=div({style:{width:"72px",flexShrink:"0",backgroundSize:"cover",backgroundPosition:"center",backgroundImage:book.cover?`url(${book.cover})`:"none",backgroundColor:book.cover?"transparent":"transparent",background:book.cover?`url(${book.cover}) center/cover`:`linear-gradient(135deg,${color}33,${color}66)`,display:"flex",alignItems:"center",justifyContent:"center"}});

          info.appendChild(div({style:{fontSize:"13px",fontWeight:"700",color:"#1a1a2e",fontFamily:"'Noto Serif TC',serif",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}},[book.title]));
          if(book.author)info.appendChild(div({style:{fontSize:"11px",color:"#999",marginTop:"2px"}},[book.author]));
          const stag=div({style:{background:st.b,color:st.c,borderRadius:"20px",padding:"2px 8px",fontSize:"10px",fontWeight:"700",flexShrink:"0"}},[st.e+" "+book.status]);
          row.appendChild(cvr);row.appendChild(info);row.appendChild(stag);yList.appendChild(row);
        });
        if(booksY.length>YLIMIT){
          const tog=btn({style:{width:"100%",padding:"8px",background:"#f4f1ec",border:"none",borderRadius:"10px",fontSize:"12px",color:"#888",fontWeight:"600",marginTop:"4px"}},
            [yExpanded?"▲ 收起":"▼ 顯示全部 "+booksY.length+" 本"]);
          tog.addEventListener("click",()=>{yExpanded=!yExpanded;renderYList();});
          yList.appendChild(tog);
        }
      }
      renderYList();
      ybox.appendChild(yList);
      sc.appendChild(ybox);
    }
    // Backup
    const bkp=div({style:{background:"#fff",borderRadius:"16px",padding:"20px",marginTop:"14px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}});
    bkp.appendChild(div({style:{fontWeight:"700",fontSize:"14px",marginBottom:"6px",color:"#333"}},["💾 備份資料"]));
    bkp.appendChild(div({style:{fontSize:"12px",color:"#999",marginBottom:"14px",lineHeight:"1.6"}},["建議定期匯出備份，避免清除瀏覽器資料時書單消失。"]));
    const bRow=div({style:{display:"flex",gap:"10px"}});
    bRow.appendChild(btn({style:{flex:"1",padding:"12px",background:"#1a1a2e",color:"#fff",border:"none",borderRadius:"12px",fontSize:"14px",fontWeight:"700"},onClick:()=>{
      const blob=new Blob([JSON.stringify({books,lists,listOrders,wishlist},null,2)],{type:"application/json"});
      const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="我的書庫備份_"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(url);
    }},["💾 匯出備份"]));
    const importLabel=h("label",{style:{flex:"1",padding:"12px",background:"#fff",color:"#1a1a2e",border:"2px solid #1a1a2e",borderRadius:"12px",fontSize:"14px",fontWeight:"700",display:"flex",alignItems:"center",justifyContent:"center",gap:"6px",cursor:"pointer"}},["📥 匯入備份"]);
    const importInput=h("input",{type:"file",accept:".json",style:{display:"none"}});
    importInput.addEventListener("change",(e)=>{
      const file=e.target.files&&e.target.files[0];if(!file)return;
      const r=new FileReader();r.onload=(ev)=>{try{const d=JSON.parse(ev.target.result);if(d.books)setState({books:d.books});if(d.lists)setState({lists:d.lists});if(d.listOrders)setState({listOrders:d.listOrders});if(d.wishlist)setState({wishlist:d.wishlist});lsSave(SK,d.books||[]);lsSave(LK,d.lists||[]);lsSave(OK,d.listOrders||{});lsSave(WK,d.wishlist||[]);alert("✅ 匯入成功！");}catch{alert("❌ 檔案格式有誤");}};
      r.readAsText(file);e.target.value="";
    });
    importLabel.appendChild(importInput);bRow.appendChild(importLabel);bkp.appendChild(bRow);sc.appendChild(bkp);
    app.appendChild(sc);
  }

  // ── Back to top button ──
  const existing=document.getElementById("backToTop");
  if(!existing){
    const topBtn=document.createElement("button");
    topBtn.id="backToTop";
    topBtn.textContent="↑";
    topBtn.style.cssText="position:fixed;bottom:24px;right:16px;width:44px;height:44px;border-radius:50%;background:#1a1a2e;color:#fff;border:none;font-size:20px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.2);display:none;z-index:999;transition:opacity .2s;";
    topBtn.addEventListener("click",()=>window.scrollTo({top:0,behavior:"smooth"}));
    document.body.appendChild(topBtn);
    window.addEventListener("scroll",()=>{
      topBtn.style.display=window.scrollY>300?"flex":"none";
      topBtn.style.alignItems="center";topBtn.style.justifyContent="center";
    },{passive:true});
  }

  // ── Modals ──
  if(modal){
    if(modal.type==="manageTags"){
      const ov=div({style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"1000",padding:"16px"},onClick:(e)=>{if(e.target===ov)setState({modal:null});}});
      const box=div({style:{background:"#fff",borderRadius:"20px",padding:"24px",width:"100%",maxWidth:"400px",maxHeight:"85vh",overflowY:"auto",boxShadow:"0 24px 80px rgba(0,0,0,0.25)"}});
      const mh=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}});
      mh.appendChild(h("h3",{style:{margin:"0",fontFamily:"'Noto Serif TC',serif",color:"#1a1a2e"}},["🏷️ 管理標籤"]));
      mh.appendChild(btn({style:{background:"none",border:"none",fontSize:"20px",color:"#999"},onClick:()=>setState({modal:null})},["✕"]));
      box.appendChild(mh);
      box.appendChild(div({style:{fontSize:"11px",color:"#aaa",marginBottom:"14px"}},["長按拖曳可調整順序"]));
      const tagList=div({style:{display:"flex",flexDirection:"column",gap:"8px",marginBottom:"16px"}});
      let dragSrc=null;
      function renderTagList(){
        tagList.innerHTML="";
        state.customTags.forEach((t,i)=>{
          const row=div({style:{display:"flex",alignItems:"center",gap:"8px",padding:"8px 10px",background:"#f9f9f9",borderRadius:"10px",cursor:"grab",userSelect:"none"},draggable:true});
          // drag handle
          row.appendChild(div({style:{color:"#ccc",fontSize:"16px",flexShrink:"0",cursor:"grab"}}),["⠿"]);
          const handle=document.createTextNode("⠿");
          row.firstChild.appendChild(handle);
          row.appendChild(div({style:{flex:"1",fontSize:"14px",color:"#1a1a2e"}},[t]));
          const delT=btn({style:{background:"#fee2e2",border:"none",borderRadius:"8px",padding:"4px 10px",fontSize:"12px",color:"#ef4444",fontWeight:"700"},onClick:()=>{
            state.customTags=state.customTags.filter(x=>x!==t);
            lsSave(TK,state.customTags);fbSaveAll();renderTagList();
          }},["刪除"]);
          row.appendChild(delT);
          // drag events
          row.addEventListener("dragstart",(e)=>{dragSrc=i;row.style.opacity="0.4";e.dataTransfer.effectAllowed="move";});
          row.addEventListener("dragend",()=>{row.style.opacity="1";});
          row.addEventListener("dragover",(e)=>{e.preventDefault();e.dataTransfer.dropEffect="move";row.style.background="#ede9fe";});
          row.addEventListener("dragleave",()=>{row.style.background="#f9f9f9";});
          row.addEventListener("drop",(e)=>{
            e.preventDefault();row.style.background="#f9f9f9";
            if(dragSrc===null||dragSrc===i)return;
            const arr=[...state.customTags];
            const [moved]=arr.splice(dragSrc,1);arr.splice(i,0,moved);
            state.customTags=arr;lsSave(TK,arr);fbSaveAll();
            dragSrc=null;renderTagList();
          });
          tagList.appendChild(row);
        });
      }
      renderTagList();
      box.appendChild(tagList);
      // Add new tag
      const addRow=div({style:{display:"flex",gap:"8px"}});
      const newTagInp=h("input",{style:{flex:"1",padding:"9px 12px",border:"2px solid #e8e8e8",borderRadius:"10px",fontSize:"13px",outline:"none"}});
      newTagInp.placeholder="新標籤名稱";
      addRow.appendChild(newTagInp);
      addRow.appendChild(btn({style:{padding:"9px 14px",background:"#1a1a2e",color:"#fff",border:"none",borderRadius:"10px",fontSize:"13px",fontWeight:"700"},onClick:()=>{
        const name=newTagInp.value.trim();
        if(!name||state.customTags.includes(name)){newTagInp.style.borderColor="#ef4444";return;}
        state.customTags=[...state.customTags,name];
        lsSave(TK,state.customTags);fbSaveAll();
        newTagInp.value="";newTagInp.style.borderColor="#e8e8e8";renderTagList();
      }},["新增"]));
      box.appendChild(addRow);ov.appendChild(box);app.appendChild(ov);
      setTimeout(()=>newTagInp.focus(),50);
    }else if(modal.type==="addList"){
      const ov=div({style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"1000",padding:"16px"},onClick:(e)=>{if(e.target===ov)setState({modal:null});}});
      const box=div({style:{background:"#fff",borderRadius:"16px",padding:"24px",width:"100%",maxWidth:"360px",boxShadow:"0 24px 80px rgba(0,0,0,0.25)"}});
      box.appendChild(h("h3",{style:{margin:"0 0 16px",fontFamily:"'Noto Serif TC',serif",color:"#1a1a2e"}},["新增書單"]));
      const inp=h("input",{style:{width:"100%",padding:"10px 14px",border:"2px solid #e8e8e8",borderRadius:"10px",fontSize:"14px",boxSizing:"border-box",outline:"none"}});
      inp.placeholder="書單名稱";
      box.appendChild(inp);
      const bRow2=div({style:{display:"flex",gap:"10px",marginTop:"16px"}});
      bRow2.appendChild(btn({style:{flex:"1",padding:"11px",border:"2px solid #e8e8e8",borderRadius:"10px",background:"#fff",fontSize:"14px",color:"#666"},onClick:()=>setState({modal:null})},["取消"]));
      bRow2.appendChild(btn({style:{flex:"1",padding:"11px",border:"none",borderRadius:"10px",background:"#1a1a2e",color:"#fff",fontSize:"14px",fontWeight:"700"},onClick:()=>{const name=inp.value.trim();if(name){addList(name);setState({modal:null,activeList:name,page:"lists"});}else{inp.style.borderColor="#ef4444";}}},["新增"]));
      box.appendChild(bRow2);ov.appendChild(box);
      app.appendChild(ov);
      inp.addEventListener("keydown",(e)=>{if(e.key==="Enter"){const name=inp.value.trim();if(name){addList(name);setState({modal:null,activeList:name,page:"lists"});}else{inp.style.borderColor="#ef4444";}}});
      setTimeout(()=>inp.focus(),50);
    }else if(modal.type==="addList_rename"){
      const ov=div({style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"1000",padding:"16px"},onClick:(e)=>{if(e.target===ov)setState({modal:null});}});
      const box=div({style:{background:"#fff",borderRadius:"16px",padding:"24px",width:"100%",maxWidth:"360px",boxShadow:"0 24px 80px rgba(0,0,0,0.25)"}});
      box.appendChild(h("h3",{style:{margin:"0 0 16px",fontFamily:"'Noto Serif TC',serif",color:"#1a1a2e"}},["重新命名"]));
      const inp=h("input",{style:{width:"100%",padding:"10px 14px",border:"2px solid #e8e8e8",borderRadius:"10px",fontSize:"14px",boxSizing:"border-box",outline:"none"}});
      inp.value=modal.data||"";
      box.appendChild(inp);
      const bRow2=div({style:{display:"flex",gap:"10px",marginTop:"16px"}});
      bRow2.appendChild(btn({style:{flex:"1",padding:"11px",border:"2px solid #e8e8e8",borderRadius:"10px",background:"#fff",fontSize:"14px",color:"#666"},onClick:()=>setState({modal:null})},["取消"]));
      bRow2.appendChild(btn({style:{flex:"1",padding:"11px",border:"none",borderRadius:"10px",background:"#1a1a2e",color:"#fff",fontSize:"14px",fontWeight:"700"},onClick:()=>{const n=inp.value.trim();if(n&&n!==modal.data){renameList(modal.data,n);}setState({modal:null});}},["儲存"]));
      box.appendChild(bRow2);ov.appendChild(box);
      app.appendChild(ov);
      inp.addEventListener("keydown",(e)=>{if(e.key==="Enter"){const n=inp.value.trim();if(n&&n!==modal.data){renameList(modal.data,n);}setState({modal:null});}});
      setTimeout(()=>{inp.focus();inp.select();},50);
    }else if(modal.type==="addBook"){
      app.appendChild(makeBookForm({},saveBook,()=>setState({modal:null}),"新增書籍"));
    }else if(modal.type==="editBook"){
      app.appendChild(makeBookForm(modal.data,saveBook,()=>setState({modal:null}),"編輯書籍"));
    }else if(modal.type==="detail"){
      app.appendChild(makeDetail(modal.data,()=>setState({modal:null}),(b)=>setState({modal:{type:"editBook",data:b}}),(id)=>{delBook(id);setState({modal:null});}));
    }else if(modal.type==="addWish"){
      app.appendChild(makeWishForm({},saveWish,()=>setState({modal:null}),"加入待購"));
    }else if(modal.type==="editWish"){
      app.appendChild(makeWishForm(modal.data,saveWish,()=>setState({modal:null}),"編輯待購"));
    }else if(modal.type==="detailWish"){
      app.appendChild(makeWishDetail(modal.data,()=>setState({modal:null}),(item)=>setState({modal:{type:"editWish",data:item}}),(id)=>{delWish(id);setState({modal:null});},(item)=>{saveBook({...item,id:Date.now(),status:"想讀",rating:0,tags:[],lists:[],addedYear:new Date().getFullYear()});delWish(item.id);setState({modal:null});}));
    }else if(modal.type==="random"){
      const book=modal.data;const mode=modal.mode;
      app.appendChild(makeRandomModal(book,()=>setState({modal:null}),(b)=>setState({modal:{type:"detail",data:b}}),()=>{
        const pool=mode==="want"?books.filter(b=>b.status==="想讀"&&b.id!==book.id):books.filter(b=>b.id!==book.id);
        if(pool.length===0)return;setState({modal:{type:"random",data:pool[Math.floor(Math.random()*pool.length)],mode}});
      }));
    }else if(modal.type==="listPicker"){
      const list=modal.list;
      const ov=div({style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"1000",padding:"16px"},onClick:(e)=>{if(e.target===ov)setState({modal:null});}});
      const mp=div({style:{background:"#fff",borderRadius:"20px",padding:"24px",width:"100%",maxWidth:"460px",maxHeight:"80vh",overflowY:"auto",boxShadow:"0 24px 80px rgba(0,0,0,0.25)"}});
      ov.appendChild(mp);
      const ph=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}});
      ph.appendChild(h("h3",{style:{margin:"0",fontFamily:"'Noto Serif TC',serif",color:"#1a1a2e"}},["從書庫選書"]));
      ph.appendChild(btn({style:{background:"none",border:"none",fontSize:"20px",color:"#999"},onClick:()=>setState({modal:null})},["✕"]));
      mp.appendChild(ph);
      const pi=h("input",{style:{width:"100%",padding:"9px 13px",border:"2px solid #e8e8e8",borderRadius:"10px",fontSize:"13px",outline:"none",boxSizing:"border-box",marginBottom:"12px"}});
      pi.placeholder="搜尋書名或作者...";
      pi.addEventListener("input",()=>{renderPicker();});
      mp.appendChild(pi);
      const pList=div({style:{display:"flex",flexDirection:"column",gap:"8px"}});
      mp.appendChild(pList);
      function renderPicker(){
        pList.innerHTML="";
        const q=(pi.value||"").toLowerCase();
        books.filter(b=>!q||(b.title&&b.title.toLowerCase().includes(q))||(b.author&&b.author.toLowerCase().includes(q))).forEach(book=>{
          const inList=book.lists&&book.lists.includes(list);
          const color=PC[book.platform]||"#888";
          const row=div({style:{display:"flex",alignItems:"center",gap:"10px",padding:"8px 10px",borderRadius:"10px",border:"2px solid",borderColor:inList?"#1a1a2e":"#f0f0f0",background:inList?"#f4f1ec":"#fff"}});
          const cvr=div({style:{width:"36px",height:"50px",flexShrink:"0",borderRadius:"4px",background:book.cover?`url(${book.cover}) center/cover`:`linear-gradient(135deg,${color}33,${color}66)`,display:"flex",alignItems:"center",justifyContent:"center"}});
          if(!book.cover)cvr.innerHTML="<span style='font-size:16px'>📖</span>";
          const inf=div({style:{flex:"1",minWidth:"0"}});
          inf.appendChild(div({style:{fontSize:"13px",fontWeight:"700",color:"#1a1a2e",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}},[book.title]));
          if(book.author)inf.appendChild(div({style:{fontSize:"11px",color:"#999"}},[book.author]));
          const ab=btn({style:{background:inList?"#fee2e2":"#1a1a2e",color:inList?"#ef4444":"#fff",border:"none",borderRadius:"8px",padding:"5px 10px",fontSize:"12px",fontWeight:"700",flexShrink:"0"},onClick:()=>{toggleBookInList(book,list,!inList);renderPicker();}},[ inList?"移除":"加入"]);
          row.appendChild(cvr);row.appendChild(inf);row.appendChild(ab);pList.appendChild(row);
        });
      }
      renderPicker();
      app.appendChild(ov);
    }
  }
}

render();
</script>
</body>
</html>
